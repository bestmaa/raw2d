<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw2D Camera Controls</title>
    <link rel="stylesheet" href="../shared/example.css" />
  </head>
  <body>
    <main class="example-stage">
      <section class="example-panel" aria-label="Raw2D camera controls example">
        <header class="example-header">
          <div class="example-eyebrow">Raw2D Interaction</div>
          <h1 class="example-title">Camera Pan / Zoom</h1>
          <p class="example-summary">
            Drag the canvas to pan the camera. Use the mouse wheel to zoom around the pointer.
          </p>
        </header>
        <div class="example-runtime">
          <canvas id="raw2d-canvas"></canvas>
          <aside class="example-info" aria-label="Camera controls">
            <h2>Camera</h2>
            <pre><code>npm install raw2d raw2d-interaction</code></pre>
            <pre><code>controls.enablePan(0);
controls.enableZoom();</code></pre>
            <div class="example-actions">
              <button id="raw2d-pan-right" type="button">Pan right</button>
              <button id="raw2d-zoom-in" type="button">Zoom in</button>
              <button id="raw2d-zoom-out" type="button">Zoom out</button>
              <button id="raw2d-reset" type="button">Reset camera</button>
            </div>
            <pre id="raw2d-stats" aria-live="polite"></pre>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
