<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw2D Texture Atlas</title>
    <link rel="stylesheet" href="../shared/example.css" />
  </head>
  <body>
    <main class="example-stage">
      <section class="example-panel" aria-label="Raw2D texture atlas example">
        <header class="example-header">
          <div class="example-eyebrow">Raw2D Sprite</div>
          <h1 class="example-title">Texture Atlas</h1>
          <p class="example-summary">
            Pack small sprite textures into one atlas and render many sprites from shared frames.
          </p>
        </header>
        <div class="example-runtime">
          <canvas id="raw2d-canvas"></canvas>
          <aside class="example-info" aria-label="Texture atlas details">
            <h2>Atlas Frames</h2>
            <pre><code>npm install raw2d</code></pre>
            <pre><code>const frame = atlas.getFrame("cyan");</code></pre>
            <div class="example-actions">
              <button id="raw2d-next-frame" type="button">Next frame</button>
            </div>
            <pre id="raw2d-stats" aria-live="polite"></pre>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
