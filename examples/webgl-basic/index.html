<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw2D WebGL Basic</title>
    <link rel="stylesheet" href="../shared/example.css" />
  </head>
  <body>
    <main class="example-stage">
      <section class="example-panel" aria-label="WebGL sprite batching example">
        <header class="example-header">
          <a class="example-eyebrow" href="../">Raw2D Examples</a>
          <h1 class="example-title">WebGL Sprite Batching</h1>
          <p class="example-summary">
            WebGL2 renderer drawing many Sprites while reporting draw calls,
            sprite batches, texture binds, and bind reduction.
          </p>
        </header>
        <div class="example-runtime">
          <canvas id="raw2d-canvas"></canvas>
          <aside class="example-info" aria-label="WebGL batching details">
            <h2>Batching Check</h2>
            <pre><code>npm install raw2d</code></pre>
            <pre><code>renderer.render(scene, camera, { spriteSorting: "texture" });</code></pre>
            <div class="example-actions">
              <button id="raw2d-sort" type="button">Disable sorting</button>
            </div>
            <pre id="raw2d-stats" aria-live="polite"></pre>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
