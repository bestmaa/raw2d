<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw2D Canvas Basic</title>
    <link rel="stylesheet" href="../shared/example.css" />
  </head>
  <body>
    <main class="example-stage">
      <section class="example-panel" aria-label="Canvas basic example">
        <header class="example-header">
          <a class="example-eyebrow" href="../">Raw2D Examples</a>
          <h1 class="example-title">Canvas Basic</h1>
          <p class="example-summary">
            Reference Canvas renderer with shapes, text, transforms, and frame stats.
          </p>
        </header>
        <div class="example-runtime">
          <canvas id="raw2d-canvas"></canvas>
          <aside class="example-info" aria-label="Canvas example details">
            <h2>Run It</h2>
            <pre><code>npm install raw2d</code></pre>
            <pre><code>import { Canvas, Scene } from "raw2d";</code></pre>
            <div class="example-actions">
              <button id="raw2d-toggle" type="button">Pause</button>
              <button id="raw2d-reset" type="button">Reset</button>
            </div>
            <pre id="raw2d-stats" aria-live="polite"></pre>
          </aside>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
