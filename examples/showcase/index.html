<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:," />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raw2D Showcase</title>
    <link rel="stylesheet" href="../shared/example.css" />
  </head>
  <body>
    <main class="example-stage">
      <section class="example-panel" aria-label="Raw2D showcase scene">
        <label>
          Renderer
          <select id="raw2d-renderer">
            <option value="canvas">Canvas</option>
            <option value="webgl">WebGL2</option>
          </select>
        </label>
        <button id="raw2d-reset" type="button">Reset camera</button>
        <button id="raw2d-copy-report" type="button">Copy report</button>
        <label><input id="raw2d-toggle-atlas" type="checkbox" checked /> Atlas sort</label>
        <label><input id="raw2d-toggle-static" type="checkbox" checked /> Static batches</label>
        <label><input id="raw2d-toggle-culling" type="checkbox" checked /> Culling</label>
        <div class="showcase-canvas-stack">
          <canvas id="raw2d-canvas"></canvas>
          <canvas id="raw2d-overlay"></canvas>
        </div>
        <canvas id="raw2d-minimap" width="220" height="140"></canvas>
        <pre id="raw2d-stats">Loading Raw2D showcase...</pre>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
