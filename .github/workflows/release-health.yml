name: Release Health

on:
  workflow_dispatch:
  schedule:
    - cron: "41 4 * * 1"

jobs:
  public-release-health:
    name: Public release health
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Release health
        run: npm run release:health
