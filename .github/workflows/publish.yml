name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Pack check
        run: npm run pack:check -- --silent

      - name: Publish
        run: |
          npm publish --workspace raw2d-core --access public
          npm publish --workspace raw2d-text --access public
          npm publish --workspace raw2d-sprite --access public
          npm publish --workspace raw2d-canvas --access public
          npm publish --workspace raw2d-webgl --access public
          npm publish --workspace raw2d-effects --access public
          npm publish --workspace raw2d-interaction --access public
          npm publish --workspace raw2d-mcp --access public
          npm publish --workspace raw2d --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
