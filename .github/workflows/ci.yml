name: CI

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build docs
        run: npm run build:docs

      - name: Pack check
        run: npm run pack:check -- --silent

  consumer:
    name: Published package consumer smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Consumer smoke
        run: npm run test:consumer
